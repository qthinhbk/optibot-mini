name: Daily OptiBot Knowledge Refresh

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-3.1-flash-lite

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore cache for articles and manifests
        uses: actions/cache/restore@v4
        with:
          path: |
            articles
            manifest.json
            upload_manifest.json
          key: optibot-cache-${{ github.run_id }}
          restore-keys: |
            optibot-cache-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily scrape and delta upload
        run: python main.py

      - name: Save cache for articles and manifests
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            articles
            manifest.json
            upload_manifest.json
          key: optibot-cache-${{ github.run_id }}

      - name: Upload latest job log
        uses: actions/upload-artifact@v4
        with:
          name: latest-job-log
          path: job_logs/latest.json
